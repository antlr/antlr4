lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .:
    dependencies:
      antlr4:
        specifier: file:../../../..
        version: file:../../../..
    devDependencies:
      typescript:
        specifier: ^5.4.5
        version: 5.4.5

packages:

  antlr4@file:../../../..:
    resolution: {directory: ../../../.., type: directory}
    engines: {node: '>=16'}

  typescript@5.4.5:
    resolution: {integrity: sha512-vcI4UpRgg81oIRUFwR0WSIHKt11nJ7SAVlYNIu+QpqeyXP+gpQJy/Z4+F0aGxSE4MqwjyXvW/TzgkLAx2AGHwQ==}
    engines: {node: '>=14.17'}
    hasBin: true

snapshots:

  antlr4@file:../../../..: {}

  typescript@5.4.5: {}
